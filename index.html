<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Log — Personal Exhibition</title>
    <link rel="icon" type="image/webp" href="assets/icon.webp">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Intro Overlay -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-container">
            <div id="intro-text"></div>
        </div>
    </div>

    <!-- Main Logbook -->
    <main id="logbook" class="logbook hidden">
        <div class="logbook-spread">
            <!-- Header -->
            <header class="logbook-header">
                <span class="header-title">FLIGHT LOG // T.S.</span>
                <div id="cockpit-instruments" class="cockpit-instruments" aria-label="live cockpit instruments">
                    <span class="instrument" data-tooltip="Flight hours — proxy for time spent in the codebase (repos × 100)">
                        <span class="instrument-label">FLT HRS</span>
                        <span class="instrument-value" id="inst-hours">—</span>
                    </span>
                    <span class="instrument" data-tooltip="Aircraft type — primary programming language across public repos">
                        <span class="instrument-label">A/C TYPE</span>
                        <span class="instrument-value" id="inst-actype">—</span>
                    </span>
                    <span class="instrument" data-tooltip="Fleet size — total public repositories on GitHub">
                        <span class="instrument-label">FLEET</span>
                        <span class="instrument-value" id="inst-fleet">—</span>
                    </span>
                    <span class="instrument" data-tooltip="Last departure — most recent push to any public repo">
                        <span class="instrument-label">LAST DEP</span>
                        <span class="instrument-value" id="inst-lastdep">—</span>
                    </span>
                </div>
                <span class="header-meta" id="header-meta">ROUTE ACTIVE</span>
            </header>

            <!-- Left Page: Route Map (EFB) -->
            <section class="left-page">
                <div id="map-container" class="map-container">
                    <svg id="map-svg" class="map-svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet">
                    </svg>
                </div>
            </section>

            <!-- Center Binding -->
            <div class="binding"></div>

            <!-- Right Page: Cockpit clipboard + paper -->
            <section class="right-page">
                <div class="paper-sheet">
                    <div id="chapter-container" class="chapter-container">
                    </div>
                </div>
            </section>

            <!-- Bottom Bar -->
            <footer class="bottom-bar">
                <div class="dot-indicators">
                    <span id="indicator-1" class="indicator"></span>
                    <span id="indicator-2" class="indicator"></span>
                    <span id="indicator-3" class="indicator"></span>
                    <span id="indicator-4" class="indicator"></span>
                    <span id="indicator-5" class="indicator"></span>
                </div>
                <div id="hint-text" class="hint-text">click a dot to begin</div>
                <div class="footer-actions">
                    <button id="checklist-toggle" class="footer-btn" type="button" aria-label="open preflight checklist">
                        [C] PREFLIGHT
                    </button>
                    <button id="reset-btn" class="footer-btn reset-btn" type="button" aria-label="reset to leg 1">
                        ↺ RESET
                    </button>
                </div>
            </footer>
        </div>
    </main>

    <!-- Flight Animation Overlay (body-level to avoid stacking context issues) -->
    <div id="flight-overlay" class="flight-overlay">
        <video id="flight-video" class="flight-video" muted playsinline preload="metadata">
            <source src="assets/timelapse.mp4" type="video/mp4">
        </video>
        <div class="cockpit-vignette"></div>
        <div class="flight-hud" id="flight-hud"></div>
    </div>

    <!-- Preflight Checklist Drawer -->
    <aside id="checklist-drawer" class="checklist-drawer" aria-hidden="true">
        <div class="checklist-header">
            <span>PRE-FLIGHT CHECKLIST</span>
            <button id="checklist-close" class="checklist-close" type="button" aria-label="close checklist">✕</button>
        </div>
        <div id="checklist-body" class="checklist-body"></div>
        <div class="checklist-footer">press <kbd>C</kbd> or <kbd>esc</kbd> to close</div>
    </aside>

    <!-- ATC Transmission + Letter (after Leg 5 lands) -->
    <div id="transmission-overlay" class="transmission-overlay" aria-hidden="true">
        <div class="transmission-stage">
            <div class="transmission-radio" id="transmission-radio"></div>
            <article class="clearance-letter" id="clearance-letter" hidden>
                <header class="letter-header">
                    <div class="letter-stamp">CLEARANCE REQUEST</div>
                    <div class="letter-meta">
                        <span id="letter-to"></span>
                        <span id="letter-from"></span>
                    </div>
                </header>
                <div class="letter-body" id="letter-body"></div>
                <footer class="letter-footer" id="letter-footer"></footer>
                <button id="letter-close" class="letter-close" type="button">close transmission</button>
            </article>
        </div>
    </div>

    <!-- Scripts -->
    <script src="chapters.js"></script>
    <script src="map.js"></script>
    <script src="main.js"></script>
</body>
</html>
